name: Bug Report
description: Report a visual issue or incorrect behavior
labels: bug
body:
  - type: markdown
    attributes:
      value: >
        Thanks for taking the time to report an issue.
        Please fill out the details below to help us investigate.
  - type: input
    attributes:
      label: Summary
      description: A brief description of the issue
    validations:
      required: true
  - type: dropdown
    attributes:
      multiple: true
      label: Affected Component
      options:
        - UI Theme
        - Editor Theme
        - Key Maps
        - Code Style
    validations:
      required: true
  - type: input
    attributes:
      label: IDE and Version
      description: "e.g., IntelliJ IDEA 2025.3, PyCharm 2025.3"
    validations:
      required: true
  - type: input
    attributes:
      label: Plugin Version
      description: "e.g., 1.0.5"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to see?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Screenshot
      description: A screenshot showing the issue (drag and drop image here)
  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched the open issues for duplicates.
          required: true
  - type: textarea
    attributes:
      label: Additional Context
      description: Any other relevant information.